<div class="login-container">
  <div class="logo">🔐</div>
  <h1>Digital Identity Hub</h1>
  <p class="subtitle">Zarządzaj swoją tożsamością cyfrową</p>

  @if(error) {
    <div class="alert alert-error">{{ error }}</div>
  }

  <div class="form-group">
    <label>Email</label>
    <input type="email" [(ngModel)]="email" placeholder="twoj@email.com">
  </div>

  <div class="form-group">
    <label>Hasło</label>
    <input type="password" [(ngModel)]="password" placeholder="••••••••">
  </div>

  <button class="btn" (click)="login()" [disabled]="loading">
    {{ loading ? 'Zalogowanie...' : 'Zaloguj się' }}
  </button>

  <button class="btn secondary" routerLink="/register">
    Nie masz konta? Zarejestruj się
  </button>
</div>
