<div class="register-container">
  <div class="logo">✨</div>
  <h1>Utwórz konto</h1>

  @if(error) {
    <div class="alert alert-error">{{ error }}</div>
  }

  <div class="form-group">
    <label>Imię i nazwisko</label>
    <input type="text" [(ngModel)]="name" placeholder="Jan Kowalski">
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" [(ngModel)]="email" placeholder="twoj@email.com">
  </div>

  <div class="form-group">
    <label>Hasło</label>
    <input type="password" [(ngModel)]="password" placeholder="••••••••">
  </div>

  <button class="btn" (click)="register()" [disabled]="loading">
    {{ loading ? 'Rejestrowanie...' : 'Zarejestruj się' }}
  </button>

  <button class="btn secondary" routerLink="/login">
    Masz już konto? Zaloguj się
  </button>
</div>
